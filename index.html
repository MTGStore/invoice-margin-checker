<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDI Invoice Margin Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; display: inline-block; margin-right: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        button { padding: 14px 30px; background: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #5568d3; }
        .violations-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 20px; }
        .violations-table th { background: #667eea; color: white; padding: 12px; text-align: left; font-weight: 600; }
        .violations-table td { padding: 12px; border: 1px solid #ddd; }
        .violations-table tr:nth-child(even) { background: #f9f9f9; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .summary-box { padding: 20px; border-radius: 4px; text-align: center; font-weight: 600; }
        .summary-ok { background: #e8f5e9; color: #2e7d32; }
        .summary-critical { background: #ffebee; color: #c62828; }
        .summary-box .number { font-size: 40px; font-weight: bold; display: block; margin-bottom: 5px; }
        .no-violations { padding: 30px; text-align: center; color: #4caf50; font-weight: 600; background: #e8f5e9; border-radius: 4px; margin-top: 20px; font-size: 18px; }
        .violations-header { padding: 15px; background: #ffebee; border-left: 4px solid #f44336; margin-top: 20px; border-radius: 4px; font-weight: 600; color: #c62828; }
        .info-box { background: #e3f2fd; border-left: 4px solid #2196f3; padding: 15px; border-radius: 4px; margin-bottom: 20px; color: #1565c0; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 PDI Invoice Margin Checker</h1>
            <p>Works with PDI Retail Purchase Invoice Tables</p>
        </div>
        <div class="content">
            <div class="card">
                <h2>📋 Invoice Analysis</h2>
                <div class="info-box">
                    ✅ <strong>Copy from PDI:</strong> Go to your invoice → Select the table → Copy → Paste below
                </div>
                
                <div class="form-group">
                    <label>Invoice Date (Optional)</label>
                    <input type="date" id="date">
                </div>
                
                <textarea id="invoiceData" placeholder="Paste the invoice table here..." style="width: 100%; min-height: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px;"></textarea>
                
                <button onclick="processInvoice()">🔍 Check Margins</button>
                
                <h2 style="margin-top: 40px;">📊 Results</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('date').valueAsDate = new Date();
        
        const MARGINS = {
            'Bakery': { min: 35, max: 42 },
            'Chips': { min: 35, max: 42 },
            'Snacks': { min: 35, max: 42 },
            'Candy': { min: 35, max: 42 },
            'Soda': { min: 36, max: 44 },
            'Non Alcohol': { min: 36, max: 44 },
            'Non-Tax Grocery': { min: 36, max: 44 },
            'Non Tax Grocery': { min: 36, max: 44 },
            'Non-Taxable': { min: 36, max: 44 },
            'TH Non Alcohol': { min: 20, max: 25 },
            'Energy drink': { min: 38, max: 45 },
            'Energy': { min: 38, max: 45 },
            'Water': { min: 42, max: 48 },
            'Isotonic': { min: 38, max: 45 },
            'Frozen': { min: 38, max: 45 },
            'Cold Food': { min: 35, max: 42 },
            'Cig Pack': { min: 8, max: 15 },
            'CIGARETTE PK': { min: 8, max: 15 },
            'Cigar': { min: 26, max: 35 },
            'E-Cigs': { min: 18, max: 25 },
            'Dip Can': { min: 18, max: 23 },
            'Tobacco': { min: 14, max: 18 },
            'Nicotine': { min: 18, max: 24 },
            'Single Beer': { min: 25, max: 30 },
            'PKG Beer': { min: 20, max: 25 },
            'Beer': { min: 20, max: 30 },
            'Wine': { min: 20, max: 25 },
            'HBA': { min: 38, max: 44 },
            'Health': { min: 38, max: 44 },
            'Auto': { min: 33, max: 38 },
            'PEG Beer': { min: 25, max: 30 },
            'Single': { min: 25, max: 30 },
            'PKG': { min: 20, max: 25 }
        };
        
        function parseInvoiceTable(text) {
            const items = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l && l.length > 2);
            
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                
                // Skip header rows
                if (line.includes('Case Name') || line.includes('Qty') || line.includes('Unit') || 
                    line.includes('Case Retail') || line.includes('Invoice') || line.includes('Retailed Item') ||
                    line.match(/^[0-9]+\s+Retailed\s+Item/) || line.length < 3) {
                    i++;
                    continue;
                }
                
                const productName = line;
                let category = null;
                let invoiceMargin = null;
                let caseRetail = null;
                let caseCost = null;
                
                // Look ahead for data
                for (let j = i + 1; j < Math.min(i + 15, lines.length); j++) {
                    const nextLine = lines[j];
                    
                    if (!category) {
                        for (let key of Object.keys(MARGINS)) {
                            if (nextLine.includes(key)) {
                                category = key;
                                break;
                            }
                        }
                    }
                    
                    if (nextLine.match(/[\d.]+\s+[\d.]+\s+[\d.$]+/) && nextLine.includes('%')) {
                        const numbers = nextLine.match(/[\d.]+/g) || [];
                        const prices = nextLine.match(/\$[\d.,]+/g) || [];
                        const margins = nextLine.match(/(\d+\.\d+)%/g) || [];
                        
                        if (prices.length >= 2 && margins.length > 0) {
                            try {
                                const priceValues = prices.map(p => parseFloat(p.replace(/[$,]/g, ''))).sort((a,b) => b-a);
                                caseRetail = priceValues[0];
                                caseCost = priceValues[1];
                                invoiceMargin = parseFloat(margins[margins.length - 1]);
                                break;
                            } catch (e) {}
                        }
                    }
                }
                
                if (category && invoiceMargin && caseRetail && caseCost) {
                    const guide = MARGINS[category];
                    let status = 'ok';
                    
                    if (invoiceMargin < guide.min) status = 'low';
                    else if (invoiceMargin > guide.max) status = 'high';
                    
                    items.push({
                        product: productName.substring(0, 80),
                        category: category,
                        margin: invoiceMargin,
                        retailPrice: caseRetail,
                        costPrice: caseCost,
                        status: status,
                        guide: guide
                    });
                }
                
                i++;
            }
            
            return items;
        }
        
        function processInvoice() {
            const invoiceData = document.getElementById('invoiceData').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!invoiceData) {
                resultsDiv.innerHTML = '<div style="color: red; padding: 20px;">❌ Please paste invoice data</div>';
                return;
            }
            
            const items = parseInvoiceTable(invoiceData);
            
            if (items.length === 0) {
                resultsDiv.innerHTML = '<div style="color: red; padding: 20px;">❌ No items found - make sure you pasted the invoice table correctly</div>';
                return;
            }
            
            let ok = 0, low = 0, high = 0;
            const violations = [];
            
            for (const item of items) {
                if (item.status === 'ok') {
                    ok++;
                } else {
                    if (item.status === 'low') low++;
                    else high++;
                    
                    const targetMargin = (item.guide.min + item.guide.max) / 2;
                    const suggestedRetail = item.costPrice / (1 - (targetMargin / 100));
                    
                    violations.push({
                        product: item.product,
                        category: item.category,
                        margin: item.margin.toFixed(2),
                        current: item.retailPrice.toFixed(2),
                        target: `${item.guide.min}-${item.guide.max}%`,
                        suggested: suggestedRetail.toFixed(2),
                        status: item.status
                    });
                }
            }
            
            if (violations.length === 0) {
                resultsDiv.innerHTML = `<div class="summary"><div class="summary-box summary-ok"><span class="number">${items.length}</span>ALL OK</div></div><div class="no-violations">✅ All ${items.length} items within margin guidelines!</div>`;
                return;
            }
            
            let html = `<div class="summary">
                <div class="summary-box summary-ok"><span class="number">${ok}</span>OK</div>
                <div class="summary-box summary-critical"><span class="number">${low + high}</span>OUT OF RANGE</div>
                <div class="summary-box" style="background: #fff3e0; color: #e65100;"><span class="number">${items.length}</span>TOTAL ITEMS</div>
            </div>`;
            
            if (violations.length > 0) {
                html += `<div class="violations-header">⚠️ ${violations.length} ITEMS NEED PRICE ADJUSTMENT</div>`;
                html += `<table class="violations-table"><thead><tr><th>Product</th><th>Category</th><th>Current Margin</th><th>Target Range</th><th>Current Retail</th><th>Suggested Retail</th></tr></thead><tbody>`;
                
                for (const v of violations) {
                    const bgColor = v.status === 'low' ? '#ffcccc' : '#ffe0b2';
                    const borderColor = v.status === 'low' ? '#f44336' : '#ff9800';
                    const label = v.status === 'low' ? '🔴 RAISE PRICE' : '🟠 LOWER PRICE';
                    
                    html += `<tr style="background: ${bgColor}; border-left: 4px solid ${borderColor};">
                        <td><strong>${v.product}</strong></td>
                        <td><strong>${v.category}</strong></td>
                        <td><strong>${v.margin}%</strong></td>
                        <td>${v.target}</td>
                        <td>$${v.current}</td>
                        <td style="font-weight: 600; color: #c62828;">$${v.suggested} ${label}</td>
                    </tr>`;
                }
                
                html += '</tbody></table>';
            }
            
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Margin Checker - Smart Parser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        textarea { resize: vertical; min-height: 300px; font-family: 'Courier New', monospace; font-size: 12px; }
        button { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #5568d3; }
        .debug-box { background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .debug-box.error { background: #ffebee; border-color: #f44336; color: #c62828; }
        .debug-box.success { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .violations-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        .violations-table th { background: #667eea; color: white; padding: 12px; text-align: left; font-weight: 600; }
        .violations-table td { padding: 12px; border: 1px solid #ddd; }
        .violations-table tr:nth-child(even) { background: #f9f9f9; }
        .no-violations { padding: 30px; text-align: center; color: #4caf50; font-weight: 600; background: #e8f5e9; border-radius: 4px; margin-top: 20px; }
        .violations-header { padding: 15px; background: #ffebee; border-left: 4px solid #f44336; margin-top: 20px; border-radius: 4px; font-weight: 600; color: #c62828; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .summary-box { padding: 15px; border-radius: 4px; text-align: center; font-weight: 600; }
        .summary-ok { background: #e8f5e9; color: #2e7d32; }
        .summary-critical { background: #ffebee; color: #c62828; }
        .summary-box .number { font-size: 32px; font-weight: bold; }
        .small-text { font-size: 12px; color: #666; margin-top: 5px; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Smart Invoice Margin Checker</h1>
            <p>Works with ANY vendor format - Auto-detects columns</p>
        </div>
        
        <div class="content">
            <div class="card">
                <h2>📋 Invoice Data</h2>
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="vendor" placeholder="e.g., Pepsi, Coke">
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="date">
                </div>
                <textarea id="invoiceData" placeholder="Paste invoice data here"></textarea>
                <button onclick="processInvoice()">🔍 Parse & Check</button>
            </div>
            
            <div class="card">
                <h2>🔧 Parser Settings</h2>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="debugMode" checked> Debug Mode
                    </label>
                    <div class="small-text">Show parsing details</div>
                </div>
                <button onclick="exportToEmail()" style="background: #ea4335; margin-top: 10px;">📧 Export Email</button>
                <button onclick="exportToWhatsApp()" style="background: #25d366; margin-top: 10px;">💬 Share WhatsApp</button>
                <div id="debugOutput" class="debug-box" style="display:none;"></div>
            </div>
            
            <div class="card">
                <h2>📊 Results</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('date').valueAsDate = new Date();
        
        const MARGINS = {
            'Bakery': { min: 35, max: 42 },
            'Chips/Salty': { min: 35, max: 42 },
            'Candy': { min: 35, max: 42 },
            'Soda': { min: 36, max: 44 },
            'Isotonic': { min: 38, max: 45 },
            'Energy': { min: 38, max: 45 },
            'Energy drink': { min: 38, max: 45 },
            'Water/FL Water': { min: 42, max: 48 },
            'Frozen/Ice Cream': { min: 38, max: 45 },
            'Non-Alcoholic Beverages': { min: 36, max: 44 },
            'Non Alcohol': { min: 36, max: 44 },
            'TH Non Alcohol': { min: 20, max: 25 },
            'Non-Tax Groc': { min: 33, max: 38 },
            'Tax Groc': { min: 33, max: 38 },
            'Cig Pack': { min: 8, max: 15 },
            'Cig Carton': { min: 7, max: 10 },
            'Cigar/Leaf': { min: 26, max: 35 },
            'E-Cigs': { min: 18, max: 25 },
            'Dip Can': { min: 18, max: 23 },
            'Dip Roll/Tobacco': { min: 14, max: 18 },
            'Nicotine Pouches': { min: 18, max: 24 },
            'Beer-Single': { min: 25, max: 30 },
            'Beer-PKG': { min: 20, max: 25 },
            'Wine': { min: 20, max: 25 },
            'Novelty-Other': { min: 50, max: 60 },
            'Novelty-Vape': { min: 45, max: 55 },
            'Novelty-Merch': { min: 50, max: 60 },
            'Health/Hygiene': { min: 38, max: 44 },
            'Auto': { min: 33, max: 38 }
        };
        
        let debugLog = [];
        function log(msg) {
            debugLog.push(msg);
        }
        
        function parseInvoice(text) {
            debugLog = [];
            const items = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            let i = 0;
            
            log(`📄 Parsing ${lines.length} lines`);
            
            while (i < lines.length) {
                const productName = lines[i];
                
                if (i + 1 < lines.length && /^\d{8,}/.test(lines[i + 1])) {
                    const upc = lines[i + 1];
                    let category = 'Other';
                    
                    for (let j = i + 2; j < Math.min(i + 8, lines.length); j++) {
                        const line = lines[j];
                        const catMatch = line.match(/^\d(.+)$/) || 
                                       (line.match(/^[A-Z][a-z\s\/]+$/) && !line.includes('$') && !line.includes('%') ? line : null);
                        if (catMatch) {
                            category = (catMatch[1] || catMatch[0] || catMatch).trim();
                            if (category && category.length > 2 && category.length < 50) break;
                        }
                    }
                    
                    let dataLine = null;
                    for (let j = i + 3; j < Math.min(i + 20, lines.length); j++) {
                        if (lines[j].match(/^\d[\d.]*\s*\$/) || 
                            (lines[j].includes('$') && lines[j].match(/\d+\.?\d*%/))) {
                            dataLine = lines[j];
                            break;
                        }
                    }
                    
                    if (dataLine && category !== 'Other') {
                        log(`✓ ${productName.substring(0,30)} | ${category}`);
                        
                        const allNumbers = dataLine.match(/[\d.]+/g) || [];
                        const prices = dataLine.match(/\$[\d.]+/g) || [];
                        const margins = dataLine.match(/(\d+\.?\d*)%/g) || [];
                        
                        if (allNumbers.length >= 4 && margins.length > 0) {
                            try {
                                const qty = parseFloat(allNumbers[0]);
                                const marginPercent = parseFloat(margins[margins.length - 1]);
                                
                                let itemRetailTotal, caseRetailTotal;
                                
                                if (prices.length >= 5) {
                                    itemRetailTotal = parseFloat(prices[1].replace('$', ''));
                                    caseRetailTotal = parseFloat(prices[4].replace('$', ''));
                                } else if (prices.length >= 3) {
                                    const priceValues = prices.map(p => parseFloat(p.replace('$', ''))).sort((a,b) => b-a);
                                    itemRetailTotal = priceValues[0];
                                    caseRetailTotal = priceValues[Math.min(1, prices.length-1)];
                                } else {
                                    const numValues = allNumbers.map(parseFloat).sort((a,b) => b-a);
                                    itemRetailTotal = numValues[0];
                                    caseRetailTotal = numValues[Math.min(1, numValues.length-1)];
                                }
                                
                                const perUnitRetail = itemRetailTotal / qty;
                                const perUnitCost = caseRetailTotal / qty;
                                
                                if (!isNaN(perUnitRetail) && !isNaN(marginPercent) && 
                                    marginPercent > 0 && marginPercent < 100 && perUnitCost > 0) {
                                    
                                    const guide = MARGINS[category];
                                    let priceStatus = 'ok';
                                    
                                    if (guide) {
                                        if (marginPercent < guide.min) priceStatus = 'increase';
                                        else if (marginPercent > guide.max) priceStatus = 'decrease';
                                    }
                                    
                                    items.push({
                                        product: productName.substring(0, 100),
                                        upc: upc,
                                        category: category,
                                        units: qty.toFixed(0),
                                        retail: perUnitRetail,
                                        margin: marginPercent,
                                        costPerUnit: perUnitCost,
                                        priceStatus: priceStatus
                                    });
                                }
                            } catch (e) {
                                log(`  ✗ Error: ${e.message}`);
                            }
                        }
                    }
                    i++;
                } else {
                    i++;
                }
            }
            
            log(`✅ Parsed ${items.length} items`);
            return items;
        }
        
        function processInvoice() {
            const vendor = document.getElementById('vendor').value.trim();
            const invoiceData = document.getElementById('invoiceData').value.trim();
            const resultsDiv = document.getElementById('results');
            const debugDiv = document.getElementById('debugOutput');
            
            if (!invoiceData) { 
                resultsDiv.innerHTML = '<div style="color: red;">❌ Paste invoice data</div>'; 
                return; 
            }
            
            const items = parseInvoice(invoiceData);
            
            if (document.getElementById('debugMode').checked) {
                debugDiv.style.display = 'block';
                debugDiv.className = 'debug-box ' + (items.length > 0 ? 'success' : 'error');
                debugDiv.innerHTML = debugLog.join('\n');
            }
            
            if (items.length === 0) { 
                resultsDiv.innerHTML = '<div style="color: red;">❌ No items parsed - Check format or enable Debug Mode</div>'; 
                return; 
            }
            
            let ok = 0, critical = 0;
            const violations = [];
            
            for (const item of items) {
                const guide = MARGINS[item.category];
                if (!guide) continue;
                
                if (item.margin >= guide.min && item.margin <= guide.max) {
                    ok++;
                } else {
                    critical++;
                    const targetMargin = (guide.min + guide.max) / 2;
                    const suggestedRetail = item.costPerUnit / (1 - (targetMargin / 100));
                    
                    violations.push({
                        product: item.product,
                        category: item.category,
                        units: item.units,
                        retail: item.retail.toFixed(2),
                        margin: item.margin.toFixed(2),
                        target: `${guide.min}-${guide.max}%`,
                        suggested: suggestedRetail.toFixed(2),
                        diff: (suggestedRetail - item.retail).toFixed(2),
                        priceStatus: item.priceStatus
                    });
                }
            }
            
            if (violations.length === 0) {
                resultsDiv.innerHTML = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${ok + critical}</div>ALL OK</div></div><div class="no-violations">✅ All items within guidelines!</div>`;
                return;
            }
            
            let html = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${ok}</div>OK</div><div class="summary-box summary-critical"><div class="number">${critical}</div>VIOLATIONS</div></div><div class="violations-header">⚠️ ${violations.length} VIOLATIONS</div><table class="violations-table"><thead><tr><th>Product</th><th>Category</th><th>Units</th><th>Current</th><th>Margin</th><th>Target</th><th style="background: #4caf50;">Suggested</th></tr></thead><tbody>`;
            
            for (const v of violations) {
                let bgColor = '#c8e6c9';
                let borderStyle = '4px solid #4caf50';
                if (v.priceStatus === 'increase') { bgColor = '#ffcccc'; borderStyle = '4px solid #f44336'; }
                else if (v.priceStatus === 'decrease') { bgColor = '#ffe0b2'; borderStyle = '4px solid #ff9800'; }
                html += `<tr><td><small>${v.product}</small></td><td>${v.category}</td><td>${v.units}</td><td>$${v.retail}</td><td><strong>${v.margin}%</strong></td><td>${v.target}</td><td style="background: ${bgColor}; font-weight: 600; border-left: ${borderStyle};">$${v.suggested}<br><small>(${v.diff > 0 ? '+' : ''}$${v.diff})</small></td></tr>`;
            }
            html += '</tbody></table>';
            resultsDiv.innerHTML = html;
        }
        
        function generateReport() {
            const vendor = document.getElementById('vendor').value.trim() || 'Unknown Vendor';
            const date = document.getElementById('date').value || 'N/A';
            const resultsDiv = document.getElementById('results');
            const table = resultsDiv.querySelector('table');
            if (!table) { alert('No violations. Run "Parse & Check" first.'); return null; }
            
            let report = `INVOICE MARGIN VIOLATIONS\n========================\n\nVendor: ${vendor}\nDate: ${date}\nGenerated: ${new Date().toLocaleString()}\n\n`;
            const summaryBoxes = resultsDiv.querySelectorAll('.summary-box');
            if (summaryBoxes.length >= 2) {
                report += `OK: ${summaryBoxes[0].querySelector('.number').textContent}\nViolations: ${summaryBoxes[1].querySelector('.number').textContent}\n\n`;
            }
            report += `DETAILS:\n--------\n\n`;
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    report += `${cells[0].textContent.trim()} | ${cells[1].textContent} | Price: ${cells[3].textContent} → ${cells[6].textContent.split('\n')[0]}\n`;
                }
            });
            return report;
        }
        
        function exportToEmail() {
            const report = generateReport();
            if (!report) return;
            const vendor = document.getElementById('vendor').value.trim() || 'Invoice';
            const subject = `Invoice Margin Report - ${vendor}`;
            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(report)}`;
        }
        
        function exportToWhatsApp() {
            const report = generateReport();
            if (!report) return;
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }
    </script>
</body>
</html>

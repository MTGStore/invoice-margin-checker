<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Invoice Margin Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        textarea { resize: vertical; min-height: 400px; font-family: 'Courier New', monospace; font-size: 12px; }
        button { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #5568d3; }
        .violations-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        .violations-table th { background: #667eea; color: white; padding: 12px; text-align: left; font-weight: 600; }
        .violations-table td { padding: 12px; border: 1px solid #ddd; }
        .violations-table tr:nth-child(even) { background: #f9f9f9; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .summary-box { padding: 15px; border-radius: 4px; text-align: center; font-weight: 600; }
        .summary-ok { background: #e8f5e9; color: #2e7d32; }
        .summary-critical { background: #ffebee; color: #c62828; }
        .summary-box .number { font-size: 32px; font-weight: bold; }
        .no-violations { padding: 30px; text-align: center; color: #4caf50; font-weight: 600; background: #e8f5e9; border-radius: 4px; margin-top: 20px; }
        .violations-header { padding: 15px; background: #ffebee; border-left: 4px solid #f44336; margin-top: 20px; border-radius: 4px; font-weight: 600; color: #c62828; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Universal Invoice Margin Checker</h1>
            <p>Works with Coke, Pepsi, Red Bull, Tobacco, Frito-Lay, Beer, and all vendors</p>
        </div>
        <div class="content">
            <div class="card">
                <h2>📋 Invoice Data</h2>
                <div class="form-group">
                    <label>Vendor</label>
                    <select id="vendor">
                        <option value="">-- Auto-Detect --</option>
                        <option value="Coke">Coke</option>
                        <option value="Pepsi">Pepsi</option>
                        <option value="RedBull">Red Bull</option>
                        <option value="Tobacco">Tobacco</option>
                        <option value="FritoLay">Frito-Lay</option>
                        <option value="Beer">Beer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="date">
                </div>
                <textarea id="invoiceData" placeholder="Paste invoice data here"></textarea>
                <button onclick="processInvoice()">🔍 Check Margins</button>
            </div>
            
            <div class="card">
                <h2>📊 Results</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('date').valueAsDate = new Date();
        
        const MARGINS = {
            'Bakery': { min: 35, max: 42 },
            'Chips': { min: 35, max: 42 },
            'Snacks': { min: 35, max: 42 },
            'Candy': { min: 35, max: 42 },
            'Soda': { min: 36, max: 44 },
            'Non Alcohol': { min: 36, max: 44 },
            'Non-Tax Grocery': { min: 36, max: 44 },
            'Non Tax Grocery': { min: 36, max: 44 },
            'TH Non Alcohol': { min: 20, max: 25 },
            'Energy drink': { min: 38, max: 45 },
            'Water': { min: 42, max: 48 },
            'Isotonic': { min: 38, max: 45 },
            'Cig Pack': { min: 8, max: 15 },
            'CIGARETTE PK': { min: 8, max: 15 },
            'Cigar': { min: 26, max: 35 },
            'E-Cigs': { min: 18, max: 25 },
            'Dip Can': { min: 18, max: 23 },
            'Tobacco': { min: 14, max: 18 },
            'Nicotine': { min: 18, max: 24 },
            'Single Beer': { min: 25, max: 30 },
            'PKG Beer': { min: 20, max: 25 },
            'Beer': { min: 20, max: 30 },
            'Wine': { min: 20, max: 25 },
            'HBA': { min: 38, max: 44 },
            'Auto': { min: 33, max: 38 },
            'Cold Food': { min: 35, max: 42 }
        };
        
        function parseInvoice(text) {
            const items = [];
            const lines = text.split('\n');
            
            // Process line by line
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // SKIP if empty or too short
                if (!line || line.length < 5) continue;
                
                // SKIP header/footer keywords
                if (['Item', 'Retailed', 'Total Discount', 'Invoice Total', 'Invoice Margin', 
                      'Total Rebate', 'Margin After', 'Case Name', 'Dept', 'Qty', 'EDI', 'SRP',
                      'GROCERY', 'Units Per', 'Case Retail', 'Case Cost', 'Discount', 'Invoice Totals'].some(word => line.includes(word))) {
                    continue;
                }
                
                // THIS IS A PRODUCT LINE - now look ahead for category and data
                const productName = line;
                let category = null;
                let dataLine = null;
                
                // Look ahead max 30 lines
                for (let j = i + 1; j < Math.min(i + 30, lines.length); j++) {
                    const nextLine = lines[j].trim();
                    
                    // Skip empty lines
                    if (!nextLine) continue;
                    
                    // Skip GROCERY lines
                    if (nextLine.includes('GROCERY')) continue;
                    
                    // If no category found yet, check if this line IS a category
                    if (!category) {
                        for (let key of Object.keys(MARGINS)) {
                            if (nextLine === key || (nextLine.indexOf(key) !== -1 && !nextLine.includes('$'))) {
                                category = key;
                                break;
                            }
                        }
                    }
                    
                    // Check for DATA LINE - must have: qty, prices with $, margin with %
                    if (nextLine.includes('$') && nextLine.includes('%')) {
                        const dollarCount = (nextLine.match(/\$/g) || []).length;
                        const percentMatch = nextLine.match(/(\d+\.\d+)%/);
                        
                        // Real data has at least 2 prices and a margin percentage
                        if (dollarCount >= 2 && percentMatch) {
                            dataLine = nextLine;
                            break;
                        }
                    }
                }
                
                // Parse if we have both
                if (dataLine && category) {
                    try {
                        const numbers = dataLine.match(/[\d.]+/g) || [];
                        const prices = dataLine.match(/\$[\d.]+/g) || [];
                        const margins = dataLine.match(/(\d+\.\d+)%/g) || [];
                        
                        if (numbers.length >= 2 && prices.length >= 2 && margins.length > 0) {
                            const qty = parseFloat(numbers[0]);
                            const marginPercent = parseFloat(margins[margins.length - 1]);
                            
                            const priceValues = prices.map(p => parseFloat(p.replace('$', ''))).sort((a,b) => b-a);
                            const itemRetail = priceValues[0];
                            const caseRetail = priceValues[1];
                            
                            const perUnitRetail = itemRetail / qty;
                            const perUnitCost = caseRetail / qty;
                            
                            // Validate
                            if (qty > 0 && itemRetail > 0 && caseRetail > 0 && marginPercent > 0 && marginPercent < 200) {
                                const guide = MARGINS[category];
                                let status = 'ok';
                                
                                if (guide) {
                                    if (marginPercent < guide.min) status = 'low';
                                    else if (marginPercent > guide.max) status = 'high';
                                }
                                
                                if (guide) {
                                    items.push({
                                        product: productName.substring(0, 70),
                                        category: category,
                                        retail: perUnitRetail,
                                        margin: marginPercent,
                                        cost: perUnitCost,
                                        status: status,
                                        guide: guide
                                    });
                                }
                            }
                        }
                    } catch (e) {
                        // Skip on parse error
                    }
                }
            }
            
            return items;
        }
        
        function processInvoice() {
            const invoiceData = document.getElementById('invoiceData').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!invoiceData) {
                resultsDiv.innerHTML = '<div style="color: red; padding: 20px;">❌ Please paste invoice data</div>';
                return;
            }
            
            const items = parseInvoice(invoiceData);
            
            if (items.length === 0) {
                resultsDiv.innerHTML = '<div style="color: red; padding: 20px;">❌ No items found - check invoice format</div>';
                return;
            }
            
            let ok = 0, low = 0, high = 0;
            const violations = [];
            
            for (const item of items) {
                if (item.status === 'ok') {
                    ok++;
                } else {
                    if (item.status === 'low') low++;
                    else high++;
                    
                    const targetMargin = (item.guide.min + item.guide.max) / 2;
                    const suggestedRetail = item.cost / (1 - (targetMargin / 100));
                    
                    violations.push({
                        product: item.product,
                        category: item.category,
                        retail: item.retail.toFixed(2),
                        margin: item.margin.toFixed(2),
                        target: `${item.guide.min}-${item.guide.max}%`,
                        suggested: suggestedRetail.toFixed(2),
                        status: item.status
                    });
                }
            }
            
            if (violations.length === 0) {
                resultsDiv.innerHTML = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${items.length}</div>ALL OK</div></div><div class="no-violations">✅ All items within guidelines!</div>`;
                return;
            }
            
            let html = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${ok}</div>OK</div><div class="summary-box summary-critical"><div class="number">${low + high}</div>VIOLATIONS</div></div><div class="violations-header">⚠️ ${violations.length} ITEMS OUT OF RANGE</div><table class="violations-table"><thead><tr><th>Product</th><th>Category</th><th>Current</th><th>Margin</th><th>Target</th><th>Suggested</th></tr></thead><tbody>`;
            
            for (const v of violations) {
                const bgColor = v.status === 'low' ? '#ffcccc' : '#ffe0b2';
                const borderColor = v.status === 'low' ? '#f44336' : '#ff9800';
                html += `<tr><td><small>${v.product}</small></td><td>${v.category}</td><td>$${v.retail}</td><td><strong>${v.margin}%</strong></td><td>${v.target}</td><td style="background: ${bgColor}; border-left: 4px solid ${borderColor}; font-weight: 600;">$${v.suggested}</td></tr>`;
            }
            
            html += '</tbody></table>';
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>

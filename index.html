<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Margin Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 13px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 400px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        
        button:hover { background: #5568d3; }
        
        .violations-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .violations-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .violations-table td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        
        .violations-table tr:nth-child(even) { background: #f9f9f9; }
        
        .no-violations {
            padding: 30px;
            text-align: center;
            color: #4caf50;
            font-weight: 600;
            background: #e8f5e9;
            border-radius: 4px;
            margin-top: 20px;
        }
        
        .violations-header {
            padding: 15px;
            background: #ffebee;
            border-left: 4px solid #f44336;
            margin-top: 20px;
            border-radius: 4px;
            font-weight: 600;
            color: #c62828;
        }
        
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .summary-box {
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
        }
        
        .summary-ok { background: #e8f5e9; color: #2e7d32; }
        .summary-critical { background: #ffebee; color: #c62828; }
        
        .summary-box .number { font-size: 32px; font-weight: bold; }
        
        @media (max-width: 1024px) {
            .content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Invoice Margin Checker</h1>
            <p>Paste CStore invoice data → See violations with pricing</p>
        </div>
        
        <div class="content">
            <div class="card">
                <h2>📋 Paste Invoice Data</h2>
                
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="vendor" placeholder="e.g., Pepsi Bottling">
                </div>
                
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="date">
                </div>
                
                <textarea id="invoiceData" placeholder="Paste the invoice table here"></textarea>
                
                <button onclick="processInvoice()">🔍 Check Margins</button>
                <button onclick="exportToEmail()" style="background: #ea4335; margin-top: 10px;">📧 Export Email</button>
                <button onclick="exportToWhatsApp()" style="background: #25d366; margin-top: 10px;">💬 Share WhatsApp</button>
            </div>
            
            <div class="card">
                <h2>📊 Violations</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('date').valueAsDate = new Date();
        
        const MARGINS = {
            'Candy': { min: 35, max: 42 },
            'Chips/Salty': { min: 35, max: 42 },
            'Bakery': { min: 35, max: 42 },
            'Soda': { min: 36, max: 44 },
            'Non-Alcoholic Beverages': { min: 36, max: 44 },
            'Isotonic': { min: 38, max: 45 },
            'Energy': { min: 38, max: 45 },
            'Water/FL Water': { min: 42, max: 48 },
            'Frozen/Ice Cream': { min: 38, max: 45 },
            'TH Non Alc': { min: 20, max: 25 },
            'Non-Tax Groc': { min: 33, max: 38 },
            'Tax Groc': { min: 33, max: 38 },
            'Cig Pack': { min: 8, max: 15 },
            'Cig Carton': { min: 7, max: 10 },
            'Cigar/Leaf': { min: 26, max: 35 },
            'E-Cigs': { min: 18, max: 25 },
            'Dip Can': { min: 18, max: 23 },
            'Dip Roll/Tobacco': { min: 14, max: 18 },
            'Nicotine Pouches': { min: 18, max: 24 },
            'Beer-Single': { min: 25, max: 30 },
            'Beer-PKG': { min: 20, max: 25 },
            'Wine': { min: 20, max: 25 },
            'Novelty-Other': { min: 50, max: 60 },
            'Novelty-Vape': { min: 45, max: 55 },
            'Novelty-Merch': { min: 50, max: 60 },
            'Health/Hygiene': { min: 38, max: 44 },
            'Auto': { min: 33, max: 38 },
            'Non ALH': { min: 36, max: 44 }
        };
        
        function parseInvoice(text) {
            const items = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            
            let i = 0;
            while (i < lines.length) {
                const productName = lines[i];
                
                // Check if next line is UPC (8+ digits)
                if (i + 1 < lines.length && /^\d{8,}/.test(lines[i + 1])) {
                    const upc = lines[i + 1];
                    
                    // Next line should have category (e.g., "1Chips/Salty")
                    let category = 'Other';
                    if (i + 2 < lines.length) {
                        const categoryLine = lines[i + 2];
                        // Extract category from lines like "1Chips/Salty" or "2Beer-PKG"
                        const catMatch = categoryLine.match(/^\d(.+)$/);
                        if (catMatch) {
                            category = catMatch[1].trim();
                        }
                    }
                    
                    // Find the data line (contains prices and margin %)
                    let dataLine = null;
                    let dataLineIndex = -1;
                    for (let j = i + 3; j < Math.min(i + 10, lines.length); j++) {
                        if (lines[j].includes('$') && lines[j].includes('%')) {
                            dataLine = lines[j];
                            dataLineIndex = j;
                            break;
                        }
                    }
                    
                    if (dataLine) {
                        // Parse: "3.0000 | $4.291 | $12.87 | $3.0667 | $0.00 | $9.20 | 28.52% | $0.00 | 28.52%"
                        // OR: "3.0000$4.291$12.87$3.0667$0.00$9.2028.52%$0.00   28.52%"
                        
                        // Extract all dollar amounts and percentages
                        const prices = dataLine.match(/\$[\d.]+/g) || [];
                        const margins = dataLine.match(/(\d+\.\d+)%/g) || [];
                        const qty = dataLine.match(/^([\d.]+)/);
                        
                        if (prices.length >= 3 && margins.length > 0 && qty) {
                            const qtyNum = parseFloat(qty[1]);
                            const caseCost = parseFloat(prices[prices.length - 3].replace('$', ''));
                            const itemRetail = parseFloat(prices[prices.length - 4].replace('$', '')); // EDI SRP or Item Retail
                            const caseRetail = parseFloat(prices[prices.length - 5].replace('$', ''));
                            const marginPercent = parseFloat(margins[margins.length - 1]);
                            
                            // Calculate per-unit retail
                            const perUnitRetail = caseRetail / qtyNum;
                            
                            if (category !== 'Other' && !isNaN(perUnitRetail) && !isNaN(marginPercent)) {
                                const guide = MARGINS[category];
                                let priceStatus = 'ok';
                                
                                if (guide) {
                                    if (marginPercent < guide.min) {
                                        priceStatus = 'increase';
                                    } else if (marginPercent > guide.max) {
                                        priceStatus = 'decrease';
                                    }
                                }
                                
                                items.push({
                                    product: productName.substring(0, 100),
                                    upc: upc,
                                    category: category,
                                    units: qtyNum.toFixed(0),
                                    retail: perUnitRetail,
                                    margin: marginPercent,
                                    caseCost: caseCost,
                                    priceStatus: priceStatus
                                });
                            }
                        }
                    }
                    
                    i = dataLineIndex > -1 ? dataLineIndex + 1 : i + 1;
                } else {
                    i++;
                }
            }
            
            return items;
        }
        
        function processInvoice() {
            const vendor = document.getElementById('vendor').value.trim();
            const invoiceData = document.getElementById('invoiceData').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!invoiceData) {
                resultsDiv.innerHTML = '<div style="color: red;">❌ Paste invoice data</div>';
                return;
            }
            
            const items = parseInvoice(invoiceData);
            
            if (items.length === 0) {
                resultsDiv.innerHTML = '<div style="color: red;">❌ No items parsed. Check format.</div>';
                return;
            }
            
            let ok = 0, critical = 0;
            const violations = [];
            
            for (const item of items) {
                const guide = MARGINS[item.category];
                if (!guide) continue;
                
                if (item.margin >= guide.min && item.margin <= guide.max) {
                    ok++;
                } else {
                    critical++;
                    const targetMargin = (guide.min + guide.max) / 2;
                    const suggestedRetail = item.caseCost / (1 - (targetMargin / 100));
                    
                    violations.push({
                        product: item.product,
                        category: item.category,
                        units: item.units,
                        upc: item.upc,
                        retail: item.retail.toFixed(2),
                        margin: item.margin.toFixed(2),
                        target: `${guide.min}-${guide.max}%`,
                        suggested: suggestedRetail.toFixed(2),
                        diff: (suggestedRetail - item.retail).toFixed(2),
                        priceStatus: item.priceStatus
                    });
                }
            }
            
            if (violations.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="summary">
                        <div class="summary-box summary-ok"><div class="number">${ok + critical}</div>ALL OK</div>
                    </div>
                    <div class="no-violations">✅ All items within guidelines!</div>
                `;
                return;
            }
            
            let html = `
                <div class="summary">
                    <div class="summary-box summary-ok"><div class="number">${ok}</div>OK</div>
                    <div class="summary-box summary-critical"><div class="number">${critical}</div>VIOLATIONS</div>
                </div>
                <div class="violations-header">⚠️ ${violations.length} VIOLATIONS</div>
                <table class="violations-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Units</th>
                            <th>Current Price</th>
                            <th>Current Margin</th>
                            <th>Target</th>
                            <th style="background: #4caf50;">Suggested Price</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const v of violations) {
                let bgColor = '#c8e6c9';
                let borderStyle = '4px solid #4caf50';
                
                if (v.priceStatus === 'increase') {
                    bgColor = '#ffcccc';
                    borderStyle = '4px solid #f44336';
                } else if (v.priceStatus === 'decrease') {
                    bgColor = '#ffe0b2';
                    borderStyle = '4px solid #ff9800';
                }
                
                html += `
                    <tr>
                        <td><strong>${v.product}</strong></td>
                        <td>${v.category}</td>
                        <td>${v.units}</td>
                        <td>$${v.retail}</td>
                        <td><strong>${v.margin}%</strong></td>
                        <td>${v.target}</td>
                        <td style="background: ${bgColor}; font-weight: 600; border-left: ${borderStyle}; padding: 12px; color: #000;">$${v.suggested}<br><small>(${v.diff > 0 ? '+' : ''}$${v.diff})</small></td>
                    </tr>
                `;
            }
            
            html += '</tbody></table>';
            resultsDiv.innerHTML = html;
        }
        
        function generateReport() {
            const vendor = document.getElementById('vendor').value.trim() || 'Unknown Vendor';
            const date = document.getElementById('date').value || 'N/A';
            const resultsDiv = document.getElementById('results');
            
            const table = resultsDiv.querySelector('table');
            if (!table) {
                alert('No violations to export. Run "Check Margins" first.');
                return null;
            }
            
            let report = `INVOICE MARGIN VIOLATIONS REPORT\n`;
            report += `================================\n\n`;
            report += `Vendor: ${vendor}\n`;
            report += `Date: ${date}\n`;
            report += `Generated: ${new Date().toLocaleString()}\n\n`;
            
            const summaryBoxes = resultsDiv.querySelectorAll('.summary-box');
            if (summaryBoxes.length >= 2) {
                report += `SUMMARY:\n`;
                report += `OK Items: ${summaryBoxes[0].querySelector('.number').textContent}\n`;
                report += `Violations: ${summaryBoxes[1].querySelector('.number').textContent}\n\n`;
            }
            
            report += `VIOLATIONS DETAILS:\n`;
            report += `==================\n\n`;
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    const productName = cells[0].textContent.trim();
                    
                    report += `Product: ${productName}\n`;
                    report += `Category: ${cells[1].textContent}\n`;
                    report += `Units: ${cells[2].textContent}\n`;
                    report += `Current Price: ${cells[3].textContent}\n`;
                    report += `Current Margin: ${cells[4].textContent}\n`;
                    report += `Target Range: ${cells[5].textContent}\n`;
                    report += `Suggested Price: ${cells[6].textContent.split('\n')[0]}\n`;
                    report += `---\n\n`;
                }
            });
            
            return report;
        }
        
        function exportToEmail() {
            const report = generateReport();
            if (!report) return;
            
            const vendor = document.getElementById('vendor').value.trim() || 'Invoice';
            const subject = `Invoice Margin Violations - ${vendor}`;
            const body = encodeURIComponent(report);
            
            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${body}`;
        }
        
        function exportToWhatsApp() {
            const report = generateReport();
            if (!report) return;
            
            const message = encodeURIComponent(report);
            window.open(`https://wa.me/?text=${message}`, '_blank');
        }
    </script>
</body>
</html>

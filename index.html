<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Margin Checker - Beverage Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; font-size: 13px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        textarea { resize: vertical; min-height: 400px; font-family: 'Courier New', monospace; font-size: 12px; }
        button { width: 100%; padding: 16px; background: #667eea; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #5568d3; }
        .violations-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        .violations-table th { background: #667eea; color: white; padding: 12px; text-align: left; font-weight: 600; }
        .violations-table td { padding: 12px; border: 1px solid #ddd; }
        .violations-table tr:nth-child(even) { background: #f9f9f9; }
        .no-violations { padding: 30px; text-align: center; color: #4caf50; font-weight: 600; background: #e8f5e9; border-radius: 4px; margin-top: 20px; }
        .violations-header { padding: 15px; background: #ffebee; border-left: 4px solid #f44336; margin-top: 20px; border-radius: 4px; font-weight: 600; color: #c62828; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .summary-box { padding: 15px; border-radius: 4px; text-align: center; font-weight: 600; }
        .summary-ok { background: #e8f5e9; color: #2e7d32; }
        .summary-critical { background: #ffebee; color: #c62828; }
        .summary-box .number { font-size: 32px; font-weight: bold; }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Invoice Margin Checker</h1>
            <p>Works with Coke, Pepsi, and all beverage formats</p>
        </div>
        <div class="content">
            <div class="card">
                <h2>📋 Paste Invoice Data</h2>
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="vendor" placeholder="e.g., Coke, Pepsi">
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="date" id="date">
                </div>
                <textarea id="invoiceData" placeholder="Paste invoice data here"></textarea>
                <button onclick="processInvoice()">🔍 Check Margins</button>
                <button onclick="exportToEmail()" style="background: #ea4335; margin-top: 10px;">📧 Export Email</button>
                <button onclick="exportToWhatsApp()" style="background: #25d366; margin-top: 10px;">💬 Share WhatsApp</button>
            </div>
            
            <div class="card">
                <h2>📊 Results</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('date').valueAsDate = new Date();
        
        const MARGINS = {
            'Bakery': { min: 35, max: 42 },
            'Chips/Salty': { min: 35, max: 42 },
            'Candy': { min: 35, max: 42 },
            'Soda': { min: 36, max: 44 },
            'Non Alcohol': { min: 36, max: 44 },
            'TH Non Alcohol': { min: 20, max: 25 },
            'Energy drink': { min: 38, max: 45 },
            'Water/FL Water': { min: 42, max: 48 },
            'Frozen/Ice Cream': { min: 38, max: 45 }
        };
        
        function parseInvoice(text) {
            const items = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            let i = 0;
            
            while (i < lines.length) {
                const productName = lines[i];
                
                // Look for UPC (8+ digits)
                if (i + 1 < lines.length && /^\d{8,}/.test(lines[i + 1])) {
                    const upc = lines[i + 1];
                    let category = 'Other';
                    
                    // Find category (next few lines)
                    for (let j = i + 2; j < Math.min(i + 6, lines.length); j++) {
                        const line = lines[j];
                        // Match category like "Non Alcohol", "Soda", etc
                        if (line.match(/^[A-Z][a-z\s\/]+$/) && !line.includes('$') && !line.includes('%')) {
                            category = line.trim();
                            break;
                        }
                    }
                    
                    // Find data line (contains $ and %)
                    let dataLine = null;
                    for (let j = i + 3; j < Math.min(i + 15, lines.length); j++) {
                        if (lines[j].includes('$') && lines[j].includes('%')) {
                            dataLine = lines[j];
                            break;
                        }
                    }
                    
                    if (dataLine && category !== 'Other') {
                        // Extract numbers: Qty, Retail, Case Retail, Margin
                        const numbers = dataLine.match(/[\d.]+/g) || [];
                        const prices = dataLine.match(/\$[\d.]+/g) || [];
                        const margins = dataLine.match(/(\d+\.\d+)%/g) || [];
                        
                        if (numbers.length >= 4 && prices.length >= 2 && margins.length > 0) {
                            const qty = parseFloat(numbers[0]);
                            const marginPercent = parseFloat(margins[margins.length - 1]);
                            
                            // Get the two largest prices (Retail and Cost)
                            const priceValues = prices.map(p => parseFloat(p.replace('$', ''))).sort((a,b) => b-a);
                            const itemRetail = priceValues[0];
                            const caseRetail = priceValues[Math.min(1, priceValues.length-1)];
                            
                            const perUnitRetail = itemRetail / qty;
                            const perUnitCost = caseRetail / qty;
                            
                            if (!isNaN(perUnitRetail) && !isNaN(marginPercent) && marginPercent > 0 && marginPercent < 100) {
                                const guide = MARGINS[category];
                                let status = 'ok';
                                
                                if (guide) {
                                    if (marginPercent < guide.min) status = 'low';
                                    else if (marginPercent > guide.max) status = 'high';
                                }
                                
                                items.push({
                                    product: productName.substring(0, 50),
                                    category: category,
                                    retail: perUnitRetail,
                                    margin: marginPercent,
                                    cost: perUnitCost,
                                    status: status,
                                    guide: guide
                                });
                            }
                        }
                    }
                    i++;
                } else {
                    i++;
                }
            }
            
            return items;
        }
        
        function processInvoice() {
            const vendor = document.getElementById('vendor').value.trim();
            const invoiceData = document.getElementById('invoiceData').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!invoiceData) {
                resultsDiv.innerHTML = '<div style="color: red;">❌ Paste invoice data</div>';
                return;
            }
            
            const items = parseInvoice(invoiceData);
            
            if (items.length === 0) {
                resultsDiv.innerHTML = '<div style="color: red;">❌ No items parsed</div>';
                return;
            }
            
            let ok = 0, low = 0, high = 0;
            const violations = [];
            
            for (const item of items) {
                if (!item.guide) continue;
                
                if (item.status === 'ok') {
                    ok++;
                } else {
                    if (item.status === 'low') low++;
                    else high++;
                    
                    const targetMargin = (item.guide.min + item.guide.max) / 2;
                    const suggestedRetail = item.cost / (1 - (targetMargin / 100));
                    
                    violations.push({
                        product: item.product,
                        category: item.category,
                        retail: item.retail.toFixed(2),
                        margin: item.margin.toFixed(2),
                        target: `${item.guide.min}-${item.guide.max}%`,
                        suggested: suggestedRetail.toFixed(2),
                        status: item.status
                    });
                }
            }
            
            if (violations.length === 0) {
                resultsDiv.innerHTML = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${items.length}</div>ALL OK</div></div><div class="no-violations">✅ All items within guidelines!</div>`;
                return;
            }
            
            let html = `<div class="summary"><div class="summary-box summary-ok"><div class="number">${ok}</div>OK</div><div class="summary-box summary-critical"><div class="number">${low + high}</div>VIOLATIONS</div></div><div class="violations-header">⚠️ ${violations.length} VIOLATIONS</div><table class="violations-table"><thead><tr><th>Product</th><th>Category</th><th>Current</th><th>Margin</th><th>Target</th><th>Suggested</th></tr></thead><tbody>`;
            
            for (const v of violations) {
                const bgColor = v.status === 'low' ? '#ffcccc' : '#ffe0b2';
                const borderColor = v.status === 'low' ? '#f44336' : '#ff9800';
                html += `<tr><td><small>${v.product}</small></td><td>${v.category}</td><td>$${v.retail}</td><td><strong>${v.margin}%</strong></td><td>${v.target}</td><td style="background: ${bgColor}; border-left: 4px solid ${borderColor}; font-weight: 600;">$${v.suggested}</td></tr>`;
            }
            
            html += '</tbody></table>';
            resultsDiv.innerHTML = html;
        }
        
        function generateReport() {
            const vendor = document.getElementById('vendor').value.trim() || 'Unknown';
            const resultsDiv = document.getElementById('results');
            const table = resultsDiv.querySelector('table');
            if (!table) return null;
            
            let report = `INVOICE MARGIN VIOLATIONS\n========================\nVendor: ${vendor}\nDate: ${new Date().toLocaleString()}\n\n`;
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 6) {
                    report += `${cells[0].textContent.trim()} | ${cells[1].textContent} | $${cells[2].textContent} → $${cells[5].textContent}\n`;
                }
            });
            return report;
        }
        
        function exportToEmail() {
            const report = generateReport();
            if (!report) return;
            const vendor = document.getElementById('vendor').value.trim() || 'Invoice';
            const subject = `Invoice Violations - ${vendor}`;
            window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(report)}`;
        }
        
        function exportToWhatsApp() {
            const report = generateReport();
            if (!report) return;
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }
    </script>
</body>
</html>
